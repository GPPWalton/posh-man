name: Deploy Docs
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo doc --no-default-features
      - run: |
          echo "<meta http-equiv='refresh' content='0; url=posh_man/index.html'>" > target/docs/posh_man/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/docs/posh_man
      - uses: actions/deploy-pages@v4   